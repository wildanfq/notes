version: "3.8"
services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: note-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: note-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
